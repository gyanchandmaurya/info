/* ----------------------Enquiry Solar Site Survey Form Start------------------------ */
        /* SURVEY FORM CSS STYLING */
        .wishes_form{
          display: flex;
          justify-content: center;
        }
        .form-container {
            background-color: #f4eaea;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
            border-style: solid;
            border-width: 2px;
            border-color: darkmagenta;
        }
        h2 {
            text-align: center;
            color: blue;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #666;
            font-weight: 600;
        }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box; /* Ensures padding doesn't affect width */
            font-size: 14px;
        }
        textarea {
            resize: vertical;
        }
        .wishes_button {
            width: 50%;
            padding: 12px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-left: 25%;
        }
        .wishes_button:hover {
            background-color: #218838;
        }
        .wishes_button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
        #status {
            margin-top: 15px;
            text-align: center;
            font-size: 14px;
        }
        .success { color: green; }
        .error { color: red; }
/* ----------------------Enquiry Solar Site Survey Form Start------------------------ */

<body>
    <!-- ----------------------Wishes Form Start-------------------------- -->
    <div class="wishes_form" id="contactus">
    <div class="form-container">
        <h2>Add Your Event</h2>
        <form id="contactForm">
            <div class="form-group">
                <select id="wishes_type" name="wishes_type" required>
                    <option value="" disabled selected>Select Wishes Type</option>
                    <option value="Happy Birthday">Birthday</option>
                    <option value="Happy Marriage Anniversary">Marriage Anniversary</option>
                    <option value="Insurance Renewal">Insurance Renewal</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            
            <div class="form-group">
                <!-- <label for="name">Name</label> -->
                <input type="text" id="name" name="name" placeholder="Enter Your Full Name" required>
            </div>

            <div class="form-group">
                <!-- <label for="email">Email</label> -->
                <input type="email" id="email" name="email" placeholder="Enter Your E-Mail" required>
            </div>

            <div class="form-group">
                <!-- <label for="email">Email</label> -->
                <input type="tel" id="tel" name="tel" placeholder="Enter Your Mobile Number" required>
            </div>

            <div class="form-group">
                <label for="date">Date of Birth / Marriage</label>
                <input type="date" id="date" name="date" placeholder="" required>
            </div>

            <div class="form-group">
                <!-- <label for="wishemessage">Message</label> -->
                <input type="text" id="wishemessage" name="wishemessage" placeholder="Your Message" required>
            </div>

            <div class="form-group">
                <select id="wishes_img" name="wishes_img" required>
                    <option value="" disabled selected>Select Image</option>
                    <option value="1AtzG5-y69RODQVKFYJCgVMsth9FVSySC">Birthday Image</option>
                    <option value="1sxk2PyfiIQgb8uvDuO3l8edtCtCtt78U">Marraige Anniversary Image</option>
                    <option value="1s-AEkz7auPj53LDCdzsCT6VN49n9n1b-">Insurance Renewal</option>
                    <option value="1ovtNRQCZEnuYcr4QXVBIl3jjEWeEFwN8">Other</option>
                </select>
            </div>

            <div class="form-group">
                <!-- <label for="message">Message</label> -->
                <textarea id="message" name="message" rows="4" placeholder="Write your remark (optional) "></textarea>
            </div>

            <button class="wishes_button" type="submit" id="submitBtn">Save Event</button>
            <div id="status"></div>
        </form>
    </div>
    </div>

    <script>
        // --- JAVASCRIPT LOGIC ---
        
        // PASTE YOUR GOOGLE APPS SCRIPT WEB APP URL HERE
        const scriptURL = 'https://script.google.com/macros/s/AKfycbw3aWBLO4uzYEY-6OjiIu0QnhRzuuHIB4J4AUE8pqOZnrQSrYNVvtWb0bwSXFgUXHCt/exec'; 

        const form = document.forms['contactForm'];
        const submitBtn = document.getElementById('submitBtn');
        const statusTxt = document.getElementById('status');

        form.addEventListener('submit', e => {
            e.preventDefault();
            
            // 1. Change button state to loading
            submitBtn.disabled = true;
            submitBtn.innerHTML = "Sending...";
            statusTxt.innerHTML = "";

            // 2. Prepare data
            const formData = new FormData(form);

            // 3. Send data to Google Script
            fetch(scriptURL, { method: 'POST', body: formData})
                .then(response => {
                    // Reset Form
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = "Submit Inquiry";
                    statusTxt.innerHTML = "Thank you! Your details have been submitted.";
                    statusTxt.className = "success";
                    form.reset();
                })
                .catch(error => {
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = "Submit Inquiry";
                    statusTxt.innerHTML = "Error! Something went wrong.";
